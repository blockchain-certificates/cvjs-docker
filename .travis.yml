language: node_js
dist: focal
branches:
  only:
    - main
services:
  - docker
before_script:
  - npm run test -- --silent
  - npm run semantic-release
script:
  - npm run build
  - npm run start
  - npm run test:docker
  - npm run test:vc-api-verifier
after_script:
  - 'if [ "$TRAVIS_PULL_REQUEST" = "false" ]; then sh scripts/update-version-static-file.sh; fi'
